name: Update mk cache

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Clone CircuitPython (shallow)
      run: git clone --filter=tree:0 --depth=1 https://github.com/adafruit/circuitpython.git

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Generate mk cache
      run: python tools/gen_mk_cache.py --cp circuitpython

    - name: Commit if changed
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/mk_cache.json
        if git diff --staged --quiet; then
          echo "No changes to mk_cache.json"
        else
          SHA=$(cd circuitpython && git rev-parse --short HEAD)
          git commit -m "Update mk cache from CircuitPython ${SHA}"
          git push
        fi
