name: Build board (custom)

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board: Found in ports/*/boards/[board_id]'
        required: true
        type: string
      version:
        description: 'Version: Can be a tag or a commit (>=8.1.0)'
        required: false
        default: latest
        type: string
      language:
        description: 'Language: Found in locale/[language].po'
        required: false
        default: en_US
        type: string
      flags:
        description: 'Flags: CIRCUITPY_* overrides, space-separated (e.g. "CIRCUITPY_WIFI=1 CIRCUITPY_DISPLAYIO=0")'
        required: false
        type: string
      branch:
        description: 'Branch of adafruit/circuitpython to build from (only if Version="latest")'
        required: false
        default: 'main'
        type: string
      debug:
        description: 'Make a debug build'
        required: false
        default: false
        type: boolean
      frozen_modules:
        description: 'Frozen modules: space-separated dir names from frozen/ to add (e.g. "Adafruit_CircuitPython_NeoPixel Adafruit_CircuitPython_HID")'
        required: false
        default: ''
        type: string
      clear_frozen:
        description: 'Clear frozen: if true, remove all board FROZEN_MPY_DIRS before adding frozen_modules'
        required: false
        default: false
        type: boolean

run-name: ${{ inputs.board }}-${{ inputs.language }}-${{ inputs.version }}${{ inputs.flags != '' && '-custom' || '' }}${{ inputs.frozen_modules != '' && '-frozen' || '' }}${{ inputs.clear_frozen && '-nofrozen' || '' }}${{ inputs.debug && '-debug' || '' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Set up repository
      run: |
        git clone --filter=tree:0 https://github.com/adafruit/circuitpython.git $GITHUB_WORKSPACE
    - name: Checkout head / tag
      env:
        TAG: ${{ inputs.version == 'latest' && 'HEAD' || inputs.version }}
      run: |
        git checkout "$TAG"
    - name: Checkout branch
      if: inputs.branch != 'main' && inputs.version == 'latest'
      env:
        BRANCH: ${{ inputs.branch }}
      run: |
        git checkout "$BRANCH"
    - name: Set up identifier
      if: inputs.debug || inputs.flags != '' || inputs.frozen_modules != '' || inputs.clear_frozen
      run: |
        > custom-build && git add custom-build
    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: 3.x
    - name: Board to port
      id: board-to-port
      run: |
        PORT=$(python tools/board_to_port.py "${{ inputs.board }}")
        echo "port=$PORT" >> $GITHUB_OUTPUT
      shell: bash
    - name: Set up port
      id: set-up-port
      uses: adafruit/circuitpython/.github/actions/deps/ports@main
      with:
        board: ${{ inputs.board }}
        port: ${{ steps.board-to-port.outputs.port }}
    - name: Set up submodules
      id: set-up-submodules
      uses: adafruit/circuitpython/.github/actions/deps/submodules@main
      with:
        action: cache
        target: ${{ inputs.board }}
    - name: Fetch custom frozen submodules
      if: inputs.frozen_modules != ''
      env:
        FROZEN_MODULES: ${{ inputs.frozen_modules }}
      run: |
        ARGS=""
        for mod in $FROZEN_MODULES; do
          ARGS="$ARGS frozen/$mod"
        done
        git submodule update --init --filter=blob:none $ARGS
    - name: Set up external
      uses: adafruit/circuitpython/.github/actions/deps/external@main
      with:
        action: cache
        port: ${{ steps.board-to-port.outputs.port }}
    - name: Set up mpy-cross
      if: steps.set-up-submodules.outputs.frozen == 'True' || inputs.frozen_modules != ''
      uses: adafruit/circuitpython/.github/actions/mpy_cross@main
      with:
        cp-version: ${{ steps.set-up-submodules.outputs.version }}
        download: false
    - name: Versions
      run: |
        python py/version.py
        gcc --version
        python3 --version
        cmake --version || true
        ninja --version || true
        aarch64-none-elf-gcc --version || true
        arm-none-eabi-gcc --version || true
        xtensa-esp32-elf-gcc --version || true
        riscv32-esp-elf-gcc --version || true
        riscv64-unknown-elf-gcc --version || true
        mkfs.fat --version || true
    - name: Apply frozen module customizations
      if: inputs.frozen_modules != '' || inputs.clear_frozen
      env:
        FROZEN_MODULES: ${{ inputs.frozen_modules }}
        CLEAR_FROZEN: ${{ inputs.clear_frozen }}
        PORT: ${{ steps.board-to-port.outputs.port }}
      run: |
        MK_FILE="ports/$PORT/user_pre_mpconfigport.mk"
        printf '# Generated by custom build workflow\n' > "$MK_FILE"
        if [ "$CLEAR_FROZEN" = "true" ]; then
          printf 'FROZEN_MPY_DIRS :=\n' >> "$MK_FILE"
        fi
        for mod in $FROZEN_MODULES; do
          printf 'FROZEN_MPY_DIRS += $(TOP)/frozen/%s\n' "$mod" >> "$MK_FILE"
        done
    - name: Build board
      env:
        TRANSLATION: ${{ inputs.language }}
        BOARD: ${{ inputs.board }}
        FLAGS: ${{ inputs.flags }}
        DEBUG: ${{ inputs.debug && '1' || '0' }}
      run: make -j4 $FLAGS BOARD="$BOARD" DEBUG=$DEBUG TRANSLATION="$TRANSLATION"
      working-directory: ports/${{ steps.board-to-port.outputs.port }}
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.board }}-${{ inputs.language }}-${{ inputs.version }}${{ inputs.flags != '' && '-custom' || '' }}${{ inputs.frozen_modules != '' && '-frozen' || '' }}${{ inputs.clear_frozen && '-nofrozen' || '' }}${{ inputs.debug && '-debug' || '' }}
        path: ports/${{ steps.board-to-port.outputs.port }}/build-${{ inputs.board }}/firmware.*
